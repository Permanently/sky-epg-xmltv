name: Update Sky EPG (all regions)

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build guides for every region
        working-directory: scripts
        run: |
          python build_all_guides.py \
            --days 7 \
            --channels-dir ../channels \
            --out-dir ../guides

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channels guides
          git diff --staged --quiet || git commit -m "Update Sky EPG ($(date -u +%Y-%m-%d))"
          git push
